<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ShopeeBot Callback</title>
</head>
<body>
<p id="msg">กำลังดำเนินการ...</p>
<script>
const params   = new URLSearchParams(window.location.search);
const code     = params.get('code');
const shop_id  = params.get('shop_id');
const error    = params.get('error');

if (error) {
  document.getElementById('msg').textContent = 'Error: ' + error;
} else if (code) {
  // ส่ง code ตรงๆ ไป Worker — ไม่ encode อะไรทั้งนั้น
  const workerUrl = 'https://shrill-morning-e9cbshopeechatbot.shinewarayut.workers.dev/'
    + '?code=' + encodeURIComponent(code)
    + (shop_id ? '&shop_id=' + encodeURIComponent(shop_id) : '');

  document.getElementById('msg').textContent = 'กำลัง redirect ไป Worker...';
  window.location.href = workerUrl;
} else {
  document.getElementById('msg').textContent = 'ไม่พบ code จาก Shopee';
}
</script>
</body>
</html>
