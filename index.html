const code   = params.get('code');
const shopId = params.get('shop_id');

if (code) {

  const workerUrl = 'https://shrill-morning-e9cbshopeechatbot.shinewarayut.workers.dev/?code=' + code;

} else {
  document.body.innerHTML = '<h3>รอรับ Code จาก Shopee...</h3>';
}
</script>
