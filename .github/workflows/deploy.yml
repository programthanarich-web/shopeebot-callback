name: Deploy to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Install Python dependencies
        run: pip install -r functions/requirements.txt

      - name: Write Service Account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/sa.json

      - name: Deploy Hosting + Functions
        run: |
          firebase deploy \
            --project shopee-sim-manager \
            --only hosting,functions \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.HOME }}/sa.json
